<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高德地图测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #map-container {
            width: 100%;
            height: 500px;
            border: 2px solid red;
            margin: 20px 0;
        }
        .info {
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
    <!-- 引入高德地图API -->
    <script src="https://webapi.amap.com/maps?v=1.4.15&key=ad325b55884f7aa47d669fa53a45af05"></script>
</head>
<body>
    <h1>高德地图测试页面</h1>
    <div class="info">
        <p>这是一个简单的HTML页面，用于测试高德地图是否能够正常显示。</p>
        <p>如果地图能够正常显示，说明API Key有效，网络连接正常。</p>
        <p>如果地图无法显示，请检查控制台错误信息。</p>
    </div>
    <!-- 地图容器 -->
    <div id="map-container"></div>
    <script>
        // 页面加载完成后初始化地图
        window.onload = function() {
            console.log('页面加载完成，开始初始化地图');
            
            // 检查AMap对象是否存在
            if (typeof AMap === 'undefined') {
                console.error('高德地图API加载失败');
                alert('高德地图API加载失败，请检查网络连接');
                return;
            }
            
            // 检查地图容器
            var mapContainer = document.getElementById('map-container');
            if (!mapContainer) {
                console.error('地图容器不存在');
                return;
            }
            
            // 检查容器尺寸
            var containerRect = mapContainer.getBoundingClientRect();
            console.log('地图容器尺寸:', containerRect);
            
            if (containerRect.width <= 0 || containerRect.height <= 0) {
                console.error('地图容器尺寸为0');
                return;
            }
            
            try {
                // 初始化地图
                var map = new AMap.Map('map-container', {
                    zoom: 12,
                    center: [116.397428, 39.90923] // 北京坐标
                });
                
                console.log('地图初始化成功:', map);
                
                // 添加标记
                var marker = new AMap.Marker({
                    position: [116.397428, 39.90923],
                    map: map,
                    title: '北京'
                });
                
                console.log('标记添加成功:', marker);
                
                // 添加地图控件
                map.addControl(new AMap.Scale());
                map.addControl(new AMap.ToolBar());
                
                console.log('控件添加成功');
                
                // 地图点击事件
                map.on('click', function(e) {
                    console.log('地图点击事件:', e);
                    alert('点击位置：经度 ' + e.lnglat.getLng() + '，纬度 ' + e.lnglat.getLat());
                });
                
                console.log('点击事件添加成功');
                
            } catch (error) {
                console.error('地图初始化失败:', error);
                alert('地图初始化失败: ' + error.message);
            }
        };
    </script>
</body>
</html>
