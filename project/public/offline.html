<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线了 - 我要揍饭</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: white;
      padding: 2rem;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
      animation: fadeIn 0.5s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .emoji {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #f97316, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    p {
      font-size: 1.1rem;
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    
    .tips {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      text-align: left;
    }
    
    .tips h3 {
      font-size: 1rem;
      color: #f97316;
      margin-bottom: 0.75rem;
    }
    
    .tips ul {
      list-style: none;
      padding-left: 0;
    }
    
    .tips li {
      color: #d1d5db;
      padding: 0.5rem 0;
      font-size: 0.9rem;
      position: relative;
      padding-left: 1.5rem;
    }
    
    .tips li::before {
      content: '💡';
      position: absolute;
      left: 0;
    }
    
    button {
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, #f97316, #fb923c);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .status {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #6b7280;
    }
    
    .status span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      margin-right: 0.5rem;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">📡</div>
    <h1>离线了</h1>
    <p>网络连接已断开，但你可以查看已缓存的菜谱</p>
    
    <div class="tips">
      <h3>离线也能做这些事：</h3>
      <ul>
        <li>查看已加载的菜谱详情</li>
        <li>浏览收藏的菜谱</li>
        <li>回顾做过的菜</li>
        <li>准备食材清单</li>
      </ul>
    </div>
    
    <button onclick="location.reload()">🔄 重试连接</button>
    
    <div class="status">
      <span></span>
      等待网络恢复...
    </div>
  </div>
  
  <script>
    // 监听网络状态变化
    window.addEventListener('online', () => {
      document.querySelector('.status span').style.background = '#22c55e';
      document.querySelector('.status').innerHTML = '<span style="background:#22c55e"></span>网络已恢复，正在重新加载...';
      setTimeout(() => location.reload(), 1000);
    });
    
    window.addEventListener('offline', () => {
      document.querySelector('.status span').style.background = '#ef4444';
    });
    
    // 定期检查网络
    setInterval(() => {
      if (navigator.onLine) {
        location.reload();
      }
    }, 5000);
  </script>
</body>
</html>
