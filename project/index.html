<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ff6b6b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="我要揍饭" />
    <title>我要揍饭 - AI 菜谱生成器</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <style>
      body { margin: 0; min-height: 100vh; background: #0b1220; }
      /* 初始加载动画 */
      .initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b1220;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      .initial-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .initial-loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 107, 107, 0.3);
        border-top-color: #ff6b6b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <meta property="og:title" content="我要揍饭 - AI 菜谱生成器" />
    <meta property="og:description" content="输入食材，生成美味菜谱。拽一点，酷一点，幽默一点。" />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="我要揍饭 - AI 菜谱生成器" />
    <meta name="twitter:description" content="输入食材，生成美味菜谱。拽一点，酷一点，幽默一点。" />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />
    <meta name="description" content="AI 菜谱生成器 - 输入现有食材，生成美味菜谱。支持收藏、问答、脑洞模式。" />
    <meta name="keywords" content="菜谱，AI，烹饪，美食，料理，生成器" />
  </head>
  <body>
    <!-- 初始加载动画 -->
    <div id="initial-loading" class="initial-loading" role="status" aria-label="加载中">
      <div class="initial-loading-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- PWA Service Worker 注册 -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered:', registration.scope);
            })
            .catch(error => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
    
    <!-- 标题设置 -->
    <script>
      (function () {
        var targetText = '我要揍饭';
        function trySet() {
          var headers = document.querySelectorAll('header h1');
          if (headers && headers.length) {
            headers.forEach(function(h){ h.textContent = targetText; });
            return true;
          }
          return false;
        }
        if (!trySet()) {
          var observer = new MutationObserver(function() {
            if (trySet()) {
              observer.disconnect();
              // 隐藏初始加载动画
              var loading = document.getElementById('initial-loading');
              if (loading) loading.classList.add('hidden');
            }
          });
          observer.observe(document.getElementById('root'), { childList: true, subtree: true });
        } else {
          // 如果立即设置成功，也隐藏加载动画
          setTimeout(function() {
            var loading = document.getElementById('initial-loading');
            if (loading) loading.classList.add('hidden');
          }, 500);
        }
      })();
    </script>
  </body>
</html>
